name = "human-bot-worker"
main = "src/index.js"
compatibility_date = "2024-01-01"

[observability]
enabled = true

[observability.logs]
enabled = true

# KV — rate limiting only
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "8b74a121b9454bc0898f2a3fa2762f33"

# Durable Objects — strongly consistent session storage
[[durable_objects.bindings]]
name = "SESSIONS"
class_name = "SessionStore"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SessionStore"]
