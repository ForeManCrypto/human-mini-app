<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proof of Human</title>
    
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="https://cdn.jsdelivr.net/gh/ShareRing/shareringlink-javascript-library@master/jquery.qrcode.min.js"></script>

<script src="sharering.query.lib.prod.min.js"></script>

    <style>
        body { font-family: sans-serif; background: #0f0f0f; color: white; text-align: center; padding: 50px 20px; margin: 0; }
        .qr-card {
            background: white;
            padding: 20px;
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #qrcode canvas { width: 100% !important; height: auto !important; }
        #status { margin-top: 20px; color: #00d1ff; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Verify Humanity</h2>
    
    <div class="sharering-query" 
     queryId="69b75ef6169a014f92b5ca1e" 
     qrcodeOwner="shareledger19u6mslpgnuepay8yyxq0f0tadnm7pmwdv0cysq" 
     mode="static"
     oninit="onInit">
    <div class="qr-card">
        <div id="qrcode"></div>
    </div>
</div>

    <div id="status">Syncing local SDK...</div>

    <script>
 // 1. Define the success callback
window.onInit = function(data) {
    console.log("SDK Initialized!", data);
    // Hide the 'Syncing' text and show a real instruction
    document.getElementById('status').innerHTML = "✅ QR Code Ready<br><small>Scan with ShareRing Me app</small>";
};

// 2. Define the callback for when they actually scan
window.onScan = function(data) {
    console.log("SUCCESS! User verified:", data);
    document.getElementById('status').innerHTML = "<h3 style='color:#00ff88'>✅ Verification Complete!</h3>";
    
    // This is where you'll tell Telegram the user is good to go
    if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.sendData(JSON.stringify({
            status: "human_verified",
            session: data.session_id
        }));
    }
};

window.ShareRingLink = {
    baseUrl: "https://api.sharering.link/v1",
    mode: "static"
};

$(document).ready(function() {
    // Only show an error if the script actually fails to load after 3 seconds
    setTimeout(() => {
        if (window.ShareRingQuery) {
            window.ShareRingQuery.init();
        } else {
            document.getElementById('status').innerHTML = "<span style='color:red'>❌ Error: SDK Library failed to load.</span>";
        }
    }, 1000);
});
    </script>
</body>
</html>
