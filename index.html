<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proof of Human</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080b10;
            --surface: #0f1520;
            --border: #1c2a3a;
            --accent: #00e5ff;
            --accent2: #00ff88;
            --danger: #ff4455;
            --text: #e0eaf5;
            --muted: #4a6070;
            --glow: 0 0 24px rgba(0,229,255,0.18);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 40px 20px 60px;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        .header {
            text-align: center;
            animation: fadeDown 0.6s ease both;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(0,229,255,0.08);
            border: 1px solid rgba(0,229,255,0.2);
            border-radius: 20px;
            padding: 4px 14px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            color: var(--accent);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        .badge::before {
            content: '';
            width: 6px; height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.1; }
        h1 span { color: var(--accent); }
        .subtitle { margin-top: 8px; font-size: 13px; color: var(--muted); font-weight: 400; }

        /* QR wrapper */
        .qr-wrapper {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            animation: fadeUp 0.6s 0.1s ease both;
            position: relative;
            overflow: hidden;
        }

        .qr-wrapper::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.6;
        }

        .qr-section { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 16px; }
        .qr-section.hidden { display: none; }

        /* The actual QR canvas generated by the library */
        .qr-card {
            background: white;
            padding: 16px;
            border-radius: 12px;
            width: 200px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--glow);
            position: relative;
            overflow: hidden;
        }

        .qr-card::before,
        .qr-card::after {
            content: '';
            position: absolute;
            width: 20px; height: 20px;
            border-color: var(--accent);
            border-style: solid;
            opacity: 0.7;
            z-index: 2;
        }
        .qr-card::before { top: -4px; left: -4px; border-width: 2px 0 0 2px; border-radius: 3px 0 0 0; }
        .qr-card::after  { bottom: -4px; right: -4px; border-width: 0 2px 2px 0; border-radius: 0 0 3px 0; }

        #qrcode canvas { width: 100% !important; height: auto !important; }

        .scan-anim {
            position: absolute;
            left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            top: 0;
            animation: scanLine 2s linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        .qr-hint {
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            color: var(--muted);
            text-align: center;
        }

        /* Status */
        #status {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 18px;
            display: flex; align-items: center; gap: 10px;
            font-size: 14px; font-weight: 700;
            color: var(--accent);
            animation: fadeUp 0.6s 0.2s ease both;
            transition: all 0.4s ease;
        }
        #status.success { border-color: rgba(0,255,136,0.3); color: var(--accent2); background: rgba(0,255,136,0.06); }
        #status.error   { border-color: rgba(255,68,85,0.3);  color: var(--danger);  background: rgba(255,68,85,0.06); }

        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%; background: currentColor;
            flex-shrink: 0; animation: pulse 1.5s infinite;
        }
        #status.success .status-dot,
        #status.error   .status-dot { animation: none; }

        /* Debug log */
        .debug-panel { width: 100%; animation: fadeUp 0.6s 0.3s ease both; }
        .debug-title {
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px; color: var(--muted);
            letter-spacing: 0.15em; text-transform: uppercase;
            margin-bottom: 8px; padding-left: 4px;
        }
        #debug-log {
            background: #040608;
            border: 1px solid var(--border);
            border-radius: 10px; padding: 14px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px; line-height: 1.7;
            max-height: 220px; overflow-y: auto;
            white-space: pre-wrap; word-break: break-all;
        }
        .log-ok   { color: var(--accent2); }
        .log-err  { color: var(--danger); }
        .log-info { color: #4a6070; }
        .log-data { color: #7090a0; }

        /* Verified */
        .verified-overlay { display: none; flex-direction: column; align-items: center; gap: 12px; padding: 10px 0; width: 100%; }
        .verified-overlay.show { display: flex; }
        .checkmark { font-size: 56px; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }
        .verified-text { font-size: 22px; font-weight: 800; color: var(--accent2); }
        .verified-name {
            font-family: 'Share Tech Mono', monospace; font-size: 13px; color: var(--muted);
            background: rgba(0,255,136,0.06); border: 1px solid rgba(0,255,136,0.15);
            border-radius: 8px; padding: 8px 16px;
        }

        @keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:translateY(0); } }
        @keyframes fadeUp   { from { opacity:0; transform:translateY(16px);  } to { opacity:1; transform:translateY(0); } }
        @keyframes pulse    { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
        @keyframes popIn    { from { transform:scale(0); opacity:0; } to { transform:scale(1); opacity:1; } }
        @keyframes scanLine { 0% { top:-2px; } 100% { top:100%; } }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <div class="badge">ShareRing Link</div>
        <h1>Proof of <span>Human</span></h1>
        <p class="subtitle">Scan the QR code with ShareRing Me to verify your identity</p>
    </div>

    <div class="qr-wrapper">
        <div class="qr-section" id="qrSection">
            <!--
                mode="static" is intentional.
                mode="dynamic" produces a malformed deep link:
                  ...vql?query:ID:SESSIONandkey=... (broken)
                mode="static" produces the correct format the app expects.
            -->
            <div class="sharering-query"
                 queryId="69b75ef6169a014f92b5ca1e"
                 qrcodeOwner="shareledger19u6mslpgnuepay8yyxq0f0tadnm7pmwdv0cysq"
                 mode="static"
                 app="ShareRing Me"
                 oninit="onInit"
                 onscan="onScan">
                <div class="qr-card">
                    <div class="scan-anim"></div>
                    <div id="qrcode"></div>
                </div>
            </div>
            <p class="qr-hint">Open ShareRing Me → Scan → Approve</p>
        </div>

        <div class="verified-overlay" id="verifiedOverlay">
            <div class="checkmark">✅</div>
            <div class="verified-text">Human Verified</div>
            <div class="verified-name" id="verifiedName" style="display:none"></div>
        </div>
    </div>

    <div id="status">
        <div class="status-dot"></div>
        <span id="statusText">Loading SDK...</span>
    </div>

    <div class="debug-panel">
        <div class="debug-title">// debug console</div>
        <div id="debug-log"></div>
    </div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/ShareRing/shareringlink-javascript-library@master/jquery.qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/ShareRing/shareringlink-javascript-library@master/sharering.query.lib.prod.min.js"></script>

<script>
    function log(msg, type) {
        var el   = document.getElementById('debug-log');
        var time = new Date().toTimeString().split(' ')[0];
        el.innerHTML += '<span class="log-' + (type||'info') + '">[' + time + '] ' + msg + '\n</span>';
        el.scrollTop = el.scrollHeight;
    }

    function setStatus(msg, type) {
        document.getElementById('status').className = type || '';
        document.getElementById('statusText').textContent = msg;
    }

    window.onInit = function(data) {
        log('✅ onInit fired', 'ok');

        // Inspect and fix the QR URL if malformed
        if (data && data.qrcode) {
            log('raw qrcode URL: ' + data.qrcode, 'data');

            // Detect the "and" bug — parameters joined with "and" instead of "&"
            if (data.qrcode.indexOf('andkey') !== -1 || data.qrcode.indexOf('andqr_owner') !== -1) {
                log('⚠️ Malformed URL detected — "and" instead of "&" — fixing...', 'err');

                // Patch: replace "andkey" → "&key", "andqr_owner" → "&qr_owner"
                var fixed = data.qrcode
                    .replace(/andkey%3D/g,      '%26key%3D')
                    .replace(/andqr_owner%3D/g, '%26qr_owner%3D')
                    .replace(/andkey=/g,        '&key=')
                    .replace(/andqr_owner=/g,   '&qr_owner=');

                log('fixed URL: ' + fixed, 'ok');

                // Re-render the QR with the fixed URL
                $('#qrcode').empty();
                $('#qrcode').qrcode({ width: 168, height: 168, text: fixed });
            } else {
                log('✅ URL looks clean — no fix needed', 'ok');
            }
        }

        setStatus('QR Ready — scan with ShareRing Me app');
    };

    window.onScan = function(data) {
        log('🎉 onScan fired!', 'ok');
        log('data: ' + JSON.stringify(data), 'data');
        handleVerified(data);
    };

    function handleVerified(data) {
        document.getElementById('qrSection').classList.add('hidden');
        document.getElementById('verifiedOverlay').classList.add('show');

        var name = (data && (
            data.name ||
            (data.result     && data.result.name)     ||
            (data.attributes && data.attributes.name) ||
            (data.data       && data.data.name)
        )) || '';

        if (name) {
            var el = document.getElementById('verifiedName');
            el.textContent = 'Name confirmed: ' + name;
            el.style.display = 'block';
        }

        setStatus('✅ Verification Complete!', 'success');

        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.sendData(JSON.stringify({
                status: 'human_verified',
                session_id: (data && data.session_id) || '',
                name: name
            }));
            log('📤 Sent to Telegram WebApp', 'ok');
        }
    }

    log('protocol: ' + window.location.protocol, window.location.protocol === 'https:' ? 'ok' : 'err');
    log('Initialising...', 'info');
</script>
</body>
</html>
