<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QR Render Test</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.qrcode/1.0/jquery.qrcode.min.js"></script>
    <script src="https://raw.githack.com/ShareRing/shareringlink-javascript-library/master/sharering.query.lib.prod.min.js"></script>

    <style>
        body { background: #111; color: white; text-align: center; padding-top: 50px; font-family: sans-serif; }
        /* This container MUST be visible and have a size for the QR to draw */
        .qrcode-container {
            background: white;
            padding: 20px;
            width: 200px;
            height: 200px;
            margin: 20px auto;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas { width: 100% !important; height: auto !important; }
    </style>
</head>
<body>

    <h2>Scan to Verify</h2>
    
    <div class="sharering-query" 
         queryId="69b75ef6169a014f92b5ca1e" 
         qrcodeOwner="shareledger19u6mslpgnuepay8yyxq0f0tadnm7pmwdv0cysq" 
         mode="static">
        <div class="qrcode-container">
            <div id="qrcode"></div>
        </div>
    </div>

    <p id="msg">Loading QR...</p>

    <script>
        // Force the SDK to ignore automatic settings and use Mainnet
        window.ShareRingLink = {
            baseUrl: "https://api.sharering.link/v1",
            mode: "static"
        };

        $(document).ready(function() {
            // Give the browser a moment to breathe, then force the render
            setTimeout(() => {
                if (window.ShareRingQuery) {
                    try {
                        window.ShareRingQuery.init();
                        document.getElementById('msg').innerText = "QR Rendered (Check below)";
                    } catch (e) {
                        document.getElementById('msg').innerText = "Error: " + e.message;
                    }
                } else {
                    document.getElementById('msg').innerText = "SDK Library not loaded.";
                }
            }, 1000);
        });
    </script>
</body>
</html>
