<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proof of Human</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.qrcode/1.0/jquery.qrcode.min.js"></script>
    
    <script src="https://raw.githack.com/ShareRing/shareringlink-javascript-library/master/sharering.query.lib.prod.min.js" crossorigin="anonymous"></script> 
    
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>

    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background:#0f0f0f; color:#fff; text-align:center; padding:40px 20px; margin:0; }
        h1 { font-size: 24px; margin-bottom: 10px; }
        p { color: #aaa; font-size: 16px; margin-bottom: 30px; }
        
        /* Layout for the QR container */
        .qrcode-content {
            margin: 0 auto;
            width: 150px; /* Controlled size */
            height: 150px;
            background: #fff;
            padding: 10px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Forcing the SDK generated canvas to fit our 150px box */
        #qrcode canvas, #qrcode img {
            width: 100% !important;
            height: auto !important;
            display: block;
        }

        #status { margin-top: 30px; font-size: 16px; color: #00ff88; min-height: 50px; }
        .error { color: #ff5555; font-weight: bold; }
        .warning { color: #ffaa00; font-size: 14px; }
    </style>
</head>
<body>

    <h1>Prove You Are Human</h1>
    <p>Scan with <b>ShareRing Me</b> app.<br>Biometric check — privacy-first.</p>
    
    <div class="sharering-query" 
         queryId="69964833c65d9f316f5ea3dd" 
         mode="static" 
         qrcodeOwner="shareledger19u6mslpgnuepay8yyxq0f0tadnm7pmwdv0cysq" 
         app="ShareRing Me" 
         oninit="onInit" 
         onscan="onScan">
        <div class="qrcode-content">
            <div id="qrcode"></div>
        </div>
    </div>

    <div id="status">Loading secure QR code...</div>

    <script>
        const tg = window.Telegram.WebApp;
        
        $(document).ready(function() {
            tg.ready();
            tg.expand();
            console.log("App ready. Chat ID Check...");
        });

        const urlParams = new URLSearchParams(location.search);
        const chatId = urlParams.get('chat_id') || 'unknown';

        // ShareRing SDK Callbacks
        function onInit(data) {
            console.log('ShareRing SDK Initialized:', data);
            document.getElementById('status').textContent = '✅ QR ready — scan now';
        }

        function onScan(data) {
            console.log('Scan Success Data:', data);
            document.getElementById('status').innerHTML = '✅ Human verified!<br>Returning to Telegram...';
            
            // Send verified status back to your Bot
            tg.sendData(JSON.stringify({
                action: 'human_verified', 
                chat_id: chatId,
                timestamp: new Date().toISOString()
            }));

            setTimeout(() => tg.close(), 2000);
        }

        // Error Handling
        window.addEventListener('error', (event) => {
            console.error('Captured Error:', event.message);
            if (event.message.includes('analyze')) {
                document.getElementById('status').innerHTML = '<span class="error">Analysis Error. Please check Dashboard Mode (Basic/Advanced).</span>';
            }
        });

        // Fail-safe check if QR doesn't load
        setTimeout(() => {
            const qrDiv = document.getElementById('qrcode');
            if (qrDiv.innerHTML.trim() === '') {
                document.getElementById('status').innerHTML += '<br><span class="warning">Still loading? Check your internet or Dashboard Query status.</span>';
            }
        }, 10000);
    </script>
</body>
</html>
