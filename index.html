<script src="sharering.query.lib.prod.min.js"></script>

<script>
    // 1. Define functions globally first
    window.onInit = function(data) {
        console.log('SDK initialized:', data);
        document.getElementById('status').innerText = "✅ QR Ready - Scan now";
    };

    window.onScan = function(data) {
        console.log('Scan success:', data);
        document.getElementById('status').innerText = "✅ Verified!";
    };

    // 2. Set Global Config
    window.ShareRingLink = {
        baseUrl: "https://api.sharering.link/v1",
        mode: "static"
    };

    $(document).ready(function() {
        console.log("Page ready. Initializing local SDK...");
        
        setTimeout(() => {
            // Check if YOUR local file loaded correctly
            if (window.ShareRingQuery) {
                window.ShareRingQuery.init();
            } else {
                document.getElementById('status').innerHTML = "<span style='color:red'>❌ Local SDK file missing! Check your GitHub repo.</span>";
            }
        }, 1500);
    });
</script>
