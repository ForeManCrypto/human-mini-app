<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proof of Human</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.qrcode/1.0/jquery.qrcode.min.js"></script>
    <script src="https://raw.githack.com/ShareRing/shareringlink-javascript-library/master/sharering.query.lib.prod.min.js" crossorigin="anonymous"></script> 
    
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>

    <style>
        body { font-family: 'Roboto', sans-serif; background:#0f0f0f; color:#fff; text-align:center; padding:40px 20px; margin:0; }
        .container { max-width: 400px; margin: 0 auto; }
        h1 { font-size: 24px; margin-bottom: 10px; }
        p { color: #aaa; font-size: 16px; margin-bottom: 30px; }
        
        .qrcode-content {
            margin: 0 auto;
            width: 160px; 
            height: 160px;
            background: #fff;
            padding: 12px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        #qrcode canvas, #qrcode img {
            width: 100% !important;
            height: auto !important;
        }

        #status { margin-top: 30px; font-size: 16px; color: #00ff88; min-height: 50px; }
        .error { color: #ff5555; }
    </style>
</head>
<body>

<div class="container">
    <h1>Are you human?</h1>
    <p>Please use the <b>ShareRing Me</b> app to scan this QR code.</p>
    
    <div class="sharering-query" 
         queryId="69b75ef6169a014f92b5ca1e" 
         mode="static" 
         qrcodeOwner="shareledger19u6mslpgnuepay8yyxq0f0tadnm7pmwdv0cysq" 
         oninit="onInit" 
         onscan="onScan">
        <div class="qrcode-content">
            <div id="qrcode"></div>
        </div>
    </div>

    <div id="status">Establishing secure connection...</div>
</div>

<script>
    const tg = window.Telegram.WebApp;

    // 1. Set Global Config to bypass auto-analysis errors
    window.ShareRingLink = {
        baseUrl: "https://api.sharering.link/v1",
        mode: "static"
    };

    $(document).ready(function() {
        tg.ready();
        tg.expand();
        
        // 2. Manual Kickstart
        // We wait 1 second to ensure all scripts are "painted" in the browser
        setTimeout(() => {
            if (window.ShareRingQuery) {
                console.log("Attempting manual SDK initialization...");
                try {
                    window.ShareRingQuery.init();
                } catch (err) {
                    console.error("Init error:", err);
                    document.getElementById('status').innerHTML = '<span class="error">Analysis Error. Check Dashboard Attributes.</span>';
                }
            } else {
                console.error("ShareRing SDK not found!");
            }
        }, 1000);
    });

    function onInit(data) {
        console.log('SDK Ready:', data);
        document.getElementById('status').textContent = '✅ QR Generated';
    }

    function onScan(data) {
        console.log('Scan Success:', data);
        document.getElementById('status').innerHTML = '✅ Verified!<br>Returning to Telegram...';
        
        // Pass the verify action back to your bot
        tg.sendData(JSON.stringify({
            action: 'human_verified',
            queryId: "69b75ef6169a014f92b5ca1e"
        }));

        setTimeout(() => tg.close(), 2000);
    }
</script>

</body>
</html>
