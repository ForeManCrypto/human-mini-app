<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proof of Human</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080b10;
            --surface: #0f1520;
            --border: #1c2a3a;
            --accent: #00e5ff;
            --accent2: #00ff88;
            --danger: #ff4455;
            --text: #e0eaf5;
            --muted: #4a6070;
            --glow: 0 0 24px rgba(0,229,255,0.18);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 40px 20px 60px;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        .header { text-align: center; animation: fadeDown 0.6s ease both; }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(0,229,255,0.08);
            border: 1px solid rgba(0,229,255,0.2);
            border-radius: 20px;
            padding: 4px 14px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            color: var(--accent);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        .badge::before {
            content: '';
            width: 6px; height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.1; }
        h1 span { color: var(--accent); }
        .subtitle { margin-top: 8px; font-size: 13px; color: var(--muted); font-weight: 400; }

        .qr-wrapper {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            animation: fadeUp 0.6s 0.1s ease both;
            position: relative;
            overflow: hidden;
        }

        .qr-wrapper::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.6;
        }

        .sr-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            color: var(--muted);
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
        }

        .sr-spinner {
            width: 36px; height: 36px;
            border: 3px solid rgba(0,229,255,0.15);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .qr-section { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 16px; }
        .qr-section.hidden { display: none; }
        .sharering-query { display: none; }

        .qr-card {
            background: white;
            padding: 16px;
            border-radius: 12px;
            width: 200px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--glow);
            position: relative;
            overflow: hidden;
        }

        .qr-card::before,
        .qr-card::after {
            content: '';
            position: absolute;
            width: 20px; height: 20px;
            border-color: var(--accent);
            border-style: solid;
            opacity: 0.7;
            z-index: 2;
        }
        .qr-card::before { top: -4px; left: -4px; border-width: 2px 0 0 2px; border-radius: 3px 0 0 0; }
        .qr-card::after  { bottom: -4px; right: -4px; border-width: 0 2px 2px 0; border-radius: 0 0 3px 0; }

        #qrcode canvas { width: 100% !important; height: auto !important; }

        .scan-anim {
            position: absolute;
            left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            top: 0;
            animation: scanLine 2s linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        .qr-hint {
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            color: var(--muted);
            text-align: center;
        }

        /* Verified overlay */
        .verified-overlay {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            width: 100%;
        }
        .verified-overlay.show { display: flex; }
        .checkmark { font-size: 56px; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }
        .verified-text { font-size: 22px; font-weight: 800; color: var(--accent2); }
        .verified-profile {
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px; color: var(--accent);
            background: rgba(0,229,255,0.06);
            border: 1px solid rgba(0,229,255,0.15);
            border-radius: 8px; padding: 8px 16px;
        }
        .verified-sub {
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px; color: var(--muted); text-align: center;
        }

        /* Retry button */
        .retry-btn {
            display: none;
            background: rgba(255,68,85,0.1);
            border: 1px solid rgba(255,68,85,0.3);
            color: var(--danger);
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 700;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
            transition: background 0.2s;
        }
        .retry-btn:hover { background: rgba(255,68,85,0.2); }
        .retry-btn.show { display: block; }

        /* Status bar */
        #status {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 18px;
            display: flex; align-items: center; gap: 10px;
            font-size: 14px; font-weight: 700; color: var(--accent);
            animation: fadeUp 0.6s 0.2s ease both;
            transition: all 0.4s ease;
        }
        #status.success { border-color: rgba(0,255,136,0.3); color: var(--accent2); background: rgba(0,255,136,0.06); }
        #status.error   { border-color: rgba(255,68,85,0.3);  color: var(--danger);  background: rgba(255,68,85,0.06); }

        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: currentColor; flex-shrink: 0;
            animation: pulse 1.5s infinite;
        }
        #status.success .status-dot,
        #status.error   .status-dot { animation: none; }

        @keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:translateY(0); } }
        @keyframes fadeUp   { from { opacity:0; transform:translateY(16px);  } to { opacity:1; transform:translateY(0); } }
        @keyframes pulse    { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
        @keyframes popIn    { from { transform:scale(0); opacity:0; } to { transform:scale(1); opacity:1; } }
        @keyframes scanLine { 0% { top:-2px; } 100% { top:100%; } }
        @keyframes spin     { to { transform:rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <div class="badge">ShareRing Link</div>
        <h1>Proof of <span>Human</span></h1>
        <p class="subtitle">Scan the QR code with ShareRing Me to verify your identity</p>
    </div>

    <div class="qr-wrapper">
        <div class="qr-section" id="qrSection">
            <div class="sr-loading" id="srLoading">
                <div class="sr-spinner"></div>
                <span>Generating QR code...</span>
            </div>

            <div class="sharering-query"
                 queryId="69b75ef6169a014f92b5ca1e,basic"
                 qrcodeOwner="shareledger19u6mslpgnuepay8yyxq0f0tadnm7pmwdv0cysq"
                 mode="dynamic"
                 app="ShareRing Me"
                 oninit="onInit"
                 onscan="onScan">
                <div class="qr-card">
                    <div class="scan-anim"></div>
                    <div id="qrcode"></div>
                </div>
            </div>

            <p class="qr-hint" id="qrHint" style="display:none">Open ShareRing Me → Scan → Approve</p>
        </div>

        <div class="verified-overlay" id="verifiedOverlay">
            <div class="checkmark">✅</div>
            <div class="verified-text">Human Verified</div>
            <div class="verified-profile" id="verifiedProfile" style="display:none"></div>
            <div class="verified-sub">Your join request has been approved.<br>Return to Telegram to enter the group.</div>
        </div>
    </div>

    <div id="status">
        <div class="status-dot"></div>
        <span id="statusText">Loading SDK...</span>
    </div>

    <!-- Retry button — shown only on timeout -->
    <button class="retry-btn" id="retryBtn" onclick="retryVerification()">
        🔄 Verification timed out — tap to retry
    </button>

</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/ShareRing/shareringlink-javascript-library@master/jquery.qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/ShareRing/shareringlink-javascript-library@master/sharering.query.lib.prod.min.js"></script>

<script>
    var WORKER_URL       = 'https://human-bot-worker.moneyforeman.workers.dev';
    var urlParams        = new URLSearchParams(window.location.search);
    var chatId           = urlParams.get('chat_id') || '';
    var userId           = urlParams.get('user_id') || '';
    var trustedSessionId = null;
    var pollHandle       = null;
    var pollCount        = 0;
    var maxPolls         = 40; // 40 × 1.5s = 60 seconds

    function setStatus(msg, type) {
        document.getElementById('status').className = type || '';
        document.getElementById('statusText').textContent = msg;
    }

    // ── onInit: QR ready — register session with Worker ──────────
    window.onInit = function(data) {
        console.log('onInit', data);
        trustedSessionId = data && (data.session_id || data.sessionId);

        document.getElementById('srLoading').style.display = 'none';
        document.querySelector('.sharering-query').style.display = 'inline-block';
        document.getElementById('qrHint').style.display = 'block';
        setStatus('QR Ready — scan with ShareRing Me app');

        // Register session so Worker knows which user/chat to approve
        if (trustedSessionId) {
            fetch(WORKER_URL + '/session', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    session_id: trustedSessionId,
                    user_id: userId,
                    chat_id: chatId
                })
            }).then(function(r) {
                console.log('Session registered:', r.status);
            }).catch(function(e) {
                console.warn('Session register error:', e);
            });
        }
    };

    // ── onScan: ShareRing app confirmed — start polling Worker ────
    window.onScan = function(data) {
        console.log('onScan fired', data);
        setStatus('Verifying with server...');
        pollCount = 0;
        pollHandle = setInterval(doPoll, 1500);
    };

    // ── Poll Worker for server-side confirmation ──────────────────
    async function doPoll() {
        pollCount++;

        if (pollCount > maxPolls) {
            clearInterval(pollHandle);
            // Verification timed out — show error and retry button
            setStatus('Verification timed out — please try again', 'error');
            document.getElementById('retryBtn').classList.add('show');
            return;
        }

        if (!trustedSessionId) {
            clearInterval(pollHandle);
            setStatus('Session error — please close and try again', 'error');
            return;
        }

        try {
            var res  = await fetch(WORKER_URL + '/check?session=' + trustedSessionId);
            var json = await res.json();
            console.log('Poll result:', json);

            if (json.verified) {
                clearInterval(pollHandle);
                handleVerified(json.data || {});
            } else {
                setStatus('Verifying... (' + pollCount + '/' + maxPolls + ')');
            }
        } catch(err) {
            console.warn('Poll error:', err.message);
        }
    }

    // ── Retry — reload the page fresh ────────────────────────────
    function retryVerification() {
        window.location.reload();
    }

    // ── Verified — show green screen ──────────────────────────────
    function handleVerified(data) {
    document.getElementById('qrSection').classList.add('hidden');
    document.getElementById('verifiedOverlay').classList.add('show');
    document.getElementById('retryBtn').classList.remove('show');

    var profile = (data.values && data.values.personal_social_profile)
               || (data.result && data.result.trim())
               || '';

    if (profile) {
        var el = document.getElementById('verifiedProfile');
        el.textContent = '@ ' + profile;
        el.style.display = 'block';
    }

    setStatus('✅ Verified! Returning to Telegram...', 'success');

    // Show success briefly then close — returns user to the bot
    setTimeout(function() {
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.close();
        }
    }, 2000); // 2 second delay so user sees the green screen
}

</script>
</body>
</html>
