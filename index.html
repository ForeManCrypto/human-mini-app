<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proof of Human</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080b10;
            --surface: #0f1520;
            --border: #1c2a3a;
            --accent: #00e5ff;
            --accent2: #00ff88;
            --danger: #ff4455;
            --text: #e0eaf5;
            --muted: #4a6070;
            --glow: 0 0 24px rgba(0,229,255,0.18);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 40px 20px 60px;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 460px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .header {
            text-align: center;
            animation: fadeDown 0.6s ease both;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(0,229,255,0.08);
            border: 1px solid rgba(0,229,255,0.2);
            border-radius: 20px;
            padding: 4px 14px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            color: var(--accent);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        .badge::before {
            content: '';
            width: 6px; height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.1; }
        h1 span { color: var(--accent); }
        .subtitle { margin-top: 8px; font-size: 13px; color: var(--muted); font-weight: 400; }

        /* Two-column mode tester */
        .mode-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            animation: fadeUp 0.6s 0.1s ease both;
        }

        .mode-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        .mode-card:hover { border-color: rgba(0,229,255,0.3); }
        .mode-card.active { border-color: var(--accent2); }

        .mode-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.5;
        }

        .mode-label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .qr-card {
            background: white;
            padding: 10px;
            border-radius: 10px;
            width: 160px;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--glow);
            position: relative;
            overflow: hidden;
        }

        .qr-card canvas { width: 100% !important; height: auto !important; }

        .scan-anim {
            position: absolute;
            left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            top: 0;
            animation: scanLine 2s linear infinite;
            pointer-events: none;
        }

        /* Full-width QR card for final working mode */
        .qr-wrapper {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            animation: fadeUp 0.6s 0.1s ease both;
            position: relative;
            overflow: hidden;
        }

        .qr-wrapper::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.6;
        }

        .qr-card-lg {
            background: white;
            padding: 16px;
            border-radius: 12px;
            width: 200px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--glow);
            position: relative;
            overflow: hidden;
        }

        .qr-card-lg::before,
        .qr-card-lg::after {
            content: '';
            position: absolute;
            width: 20px; height: 20px;
            border-color: var(--accent);
            border-style: solid;
            opacity: 0.7;
            z-index: 2;
        }
        .qr-card-lg::before { top: -4px; left: -4px; border-width: 2px 0 0 2px; border-radius: 3px 0 0 0; }
        .qr-card-lg::after  { bottom: -4px; right: -4px; border-width: 0 2px 2px 0; border-radius: 0 0 3px 0; }

        .qr-card-lg canvas { width: 100% !important; height: auto !important; }

        .qr-hint {
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            color: var(--muted);
            text-align: center;
        }

        .qr-section.hidden { display: none; }

        /* Status */
        #status {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 700;
            color: var(--accent);
            animation: fadeUp 0.6s 0.2s ease both;
            transition: all 0.4s ease;
        }
        #status.success { border-color: rgba(0,255,136,0.3); color: var(--accent2); background: rgba(0,255,136,0.06); }
        #status.error   { border-color: rgba(255,68,85,0.3);  color: var(--danger);  background: rgba(255,68,85,0.06); }

        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: currentColor;
            flex-shrink: 0;
            animation: pulse 1.5s infinite;
        }
        #status.success .status-dot,
        #status.error   .status-dot { animation: none; }

        /* Debug log */
        .debug-panel { width: 100%; animation: fadeUp 0.6s 0.3s ease both; }
        .debug-title {
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px; color: var(--muted);
            letter-spacing: 0.15em; text-transform: uppercase;
            margin-bottom: 8px; padding-left: 4px;
        }
        #debug-log {
            background: #040608;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px; line-height: 1.7;
            max-height: 220px; overflow-y: auto;
            white-space: pre-wrap; word-break: break-all;
        }
        .log-ok   { color: var(--accent2); }
        .log-err  { color: var(--danger); }
        .log-info { color: #4a6070; }
        .log-data { color: #7090a0; }

        /* Verified */
        .verified-overlay { display: none; flex-direction: column; align-items: center; gap: 12px; padding: 10px 0; width: 100%; }
        .verified-overlay.show { display: flex; }
        .checkmark { font-size: 56px; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }
        .verified-text { font-size: 22px; font-weight: 800; color: var(--accent2); }
        .verified-name {
            font-family: 'Share Tech Mono', monospace; font-size: 13px; color: var(--muted);
            background: rgba(0,255,136,0.06); border: 1px solid rgba(0,255,136,0.15);
            border-radius: 8px; padding: 8px 16px;
        }

        @keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:translateY(0); } }
        @keyframes fadeUp   { from { opacity:0; transform:translateY(16px);  } to { opacity:1; transform:translateY(0); } }
        @keyframes pulse    { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
        @keyframes popIn    { from { transform:scale(0); opacity:0; } to { transform:scale(1); opacity:1; } }
        @keyframes scanLine { 0% { top:-2px; } 100% { top:100%; } }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <div class="badge">ShareRing Link · Debug Mode</div>
        <h1>Proof of <span>Human</span></h1>
        <p class="subtitle">Testing both modes — scan each and see which fires onScan</p>
    </div>

    <!-- Side-by-side mode test -->
    <div class="mode-row">

        <!-- STATIC mode -->
        <div class="mode-card" id="card-static">
            <div class="mode-label">mode="static"</div>
            <div class="sharering-query"
                 queryId="69b75ef6169a014f92b5ca1e"
                 qrcodeOwner="shareledger19u6mslpgnuepay8yyxq0f0tadnm7pmwdv0cysq"
                 mode="static"
                 app="ShareRing Me"
                 oninit="onInitStatic"
                 onscan="onScanStatic">
                <div class="qr-card">
                    <div class="scan-anim"></div>
                    <div id="qrcode-static"></div>
                </div>
            </div>
        </div>

        <!-- DYNAMIC mode -->
        <div class="mode-card" id="card-dynamic">
            <div class="mode-label">mode="dynamic"</div>
            <div class="sharering-query"
                 queryId="69b75ef6169a014f92b5ca1e"
                 qrcodeOwner="shareledger19u6mslpgnuepay8yyxq0f0tadnm7pmwdv0cysq"
                 mode="dynamic"
                 app="ShareRing Me"
                 oninit="onInitDynamic"
                 onscan="onScanDynamic">
                <div class="qr-card">
                    <div class="scan-anim"></div>
                    <div id="qrcode-dynamic"></div>
                </div>
            </div>
        </div>

    </div>

    <!-- Status -->
    <div id="status">
        <div class="status-dot"></div>
        <span id="statusText">Loading SDK — waiting for QR codes...</span>
    </div>

    <!-- Verified overlay (shared) -->
    <div class="qr-wrapper" id="verifiedWrapper" style="display:none">
        <div class="verified-overlay show">
            <div class="checkmark">✅</div>
            <div class="verified-text">Human Verified</div>
            <div class="verified-name" id="verifiedName" style="display:none"></div>
        </div>
    </div>

    <!-- Debug log -->
    <div class="debug-panel">
        <div class="debug-title">// debug console</div>
        <div id="debug-log"></div>
    </div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/ShareRing/shareringlink-javascript-library@master/jquery.qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/ShareRing/shareringlink-javascript-library@master/sharering.query.lib.prod.min.js"></script>

<script>
    function log(msg, type) {
        var el   = document.getElementById('debug-log');
        var time = new Date().toTimeString().split(' ')[0];
        el.innerHTML += '<span class="log-' + (type||'info') + '">[' + time + '] ' + msg + '\n</span>';
        el.scrollTop = el.scrollHeight;
    }

    function setStatus(msg, type) {
        document.getElementById('status').className = type || '';
        document.getElementById('statusText').textContent = msg;
    }

    // ── STATIC callbacks ──────────────────────────────────────────
    window.onInitStatic = function(data) {
        log('✅ [STATIC] onInit fired', 'ok');
        log('[STATIC] session_id: ' + (data && data.session_id ? data.session_id : 'MISSING'), data && data.session_id ? 'ok' : 'err');
        document.getElementById('card-static').classList.add('active');
        setStatus('Static QR ready — scan it');
    };

    window.onScanStatic = function(data) {
        log('🎉 [STATIC] onScan fired!', 'ok');
        log('[STATIC] data: ' + JSON.stringify(data), 'data');
        handleVerified(data, 'static');
    };

    // ── DYNAMIC callbacks ─────────────────────────────────────────
    window.onInitDynamic = function(data) {
        log('✅ [DYNAMIC] onInit fired', 'ok');
        log('[DYNAMIC] session_id: ' + (data && data.session_id ? data.session_id : 'MISSING'), data && data.session_id ? 'ok' : 'err');
        document.getElementById('card-dynamic').classList.add('active');
        setStatus('Dynamic QR ready — scan it');
    };

    window.onScanDynamic = function(data) {
        log('🎉 [DYNAMIC] onScan fired!', 'ok');
        log('[DYNAMIC] data: ' + JSON.stringify(data), 'data');
        handleVerified(data, 'dynamic');
    };

    // ── Handle verified ───────────────────────────────────────────
    function handleVerified(data, mode) {
        log('🏆 VERIFIED via ' + mode + ' mode', 'ok');

        document.querySelector('.mode-row').style.display = 'none';
        document.getElementById('verifiedWrapper').style.display = 'block';

        var name = (data && (
            data.name ||
            (data.result     && data.result.name)     ||
            (data.attributes && data.attributes.name) ||
            (data.data       && data.data.name)
        )) || '';

        if (name) {
            var el = document.getElementById('verifiedName');
            el.textContent = 'Name confirmed: ' + name;
            el.style.display = 'block';
        }

        setStatus('✅ Verification Complete! (' + mode + ' mode worked)', 'success');

        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.sendData(JSON.stringify({
                status: 'human_verified',
                session_id: (data && data.session_id) || '',
                name: name
            }));
            log('📤 Sent to Telegram WebApp', 'ok');
        }
    }

    log('protocol: ' + window.location.protocol, window.location.protocol === 'https:' ? 'ok' : 'err');
    log('Initialising both modes...', 'info');
</script>
</body>
</html>
