<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer-when-downgrade">
    <title>Proof of Human | ShareRing</title>
    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.qrcode/1.0/jquery.qrcode.min.js"></script>
    
    <script src="https://sharering.github.io/shareringlink-javascript-library/sharering.query.lib.prod.min.js" crossorigin="anonymous"></script>

    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #0a0a0a; color: white; text-align: center; padding: 50px 20px; margin: 0; }
        .qr-card {
            background: white;
            padding: 25px;
            width: 220px;
            height: 220px;
            margin: 0 auto 20px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #qrcode canvas { width: 100% !important; height: auto !important; }
        #status { font-size: 16px; color: #00d1ff; margin-top: 20px; font-weight: 500; }
        .error-text { color: #ff4d4d; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Verify Humanity</h2>
    <p style="color: #888;">Scan with the <b>ShareRing Me</b> app</p>

    <div class="sharering-query" 
         queryId="69b75ef6169a014f92b5ca1e" 
         qrcodeOwner="shareledger19u6mslpgnuepay8yyxq0f0tadnm7pmwdv0cysq" 
         mode="static"
         oninit="onInit"
         onscan="onScan">
        <div class="qr-card">
            <div id="qrcode"></div>
        </div>
    </div>

    <div id="status">Connecting to ShareLedger...</div>

    <script>
        // 1. Force Global Config to point to Mainnet API
        window.ShareRingLink = {
            baseUrl: "https://api.sharering.link/v1",
            mode: "static"
        };

        // 2. Fallback for the SDK callback functions
        function onInit(data) {
            console.log("SDK Callback: Init Success", data);
            document.getElementById('status').innerText = "✅ QR Code Ready";
        }

        function onScan(data) {
            console.log("SDK Callback: Scan Success", data);
            document.getElementById('status').innerHTML = "<span style='color:#00ff88'>✅ Verified Successfully!</span>";
        }

        // 3. The "Manual Bridge" logic
        $(document).ready(function() {
            console.log("Page ready. Initializing SDK...");
            
            // Give the library 2 seconds to load and clear any local analysis
            setTimeout(() => {
                if (window.ShareRingQuery) {
                    try {
                        // Force manual initialization with the working parameters
                        window.ShareRingQuery.init({
                            queryId: "69b75ef6169a014f92b5ca1e",
                            qrcodeOwner: "shareledger19u6mslpgnuepay8yyxq0f0tadnm7pmwdv0cysq",
                            mode: "static"
                        });
                    } catch (err) {
                        console.error("Init Error:", err);
                        document.getElementById('status').innerHTML = '<span class="error-text">Handshake Failed. Check Dashboard Settings.</span>';
                    }
                } else {
                    document.getElementById('status').innerHTML = '<span class="error-text">SDK Library not detected.</span>';
                }
            }, 2000);
        });
    </script>
</body>
</html>
